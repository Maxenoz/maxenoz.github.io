<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSAI ARENA 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
    .arena-bg { background: radial-gradient(circle at center, #1e1b4b 0%, #000 70%); }
    .fighter-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .fighter-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 0 25px rgba(34, 211, 238, 0.5); }
    .battle-log { max-height: 300px; overflow-y: auto; scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-black text-cyan-300 arena-bg min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-6xl font-bold neon-text tracking-widest">VSAI ARENA 2026</h1>
      <p class="text-xl mt-2 text-cyan-400">AI BATTLE SIMULATOR</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- Fighters Panel -->
      <div class="lg:col-span-4 bg-zinc-950 border border-cyan-900 rounded-2xl p-6">
        <h2 class="text-2xl font-bold mb-4 flex items-center gap-3">
          <i class="fas fa-robot"></i> Fighters
        </h2>
        
        <div class="mb-6">
          <input id="fighterName" type="text" placeholder="New AI Name" 
                 class="w-full bg-zinc-900 border border-cyan-800 rounded-lg px-4 py-3 text-white">
          <button onclick="addFighter()" 
                  class="mt-3 w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold transition">
            + ADD FIGHTER
          </button>
        </div>

        <div id="fightersList" class="space-y-3 max-h-96 overflow-y-auto"></div>
      </div>

      <!-- Main Arena -->
      <div class="lg:col-span-8 space-y-6">
        <!-- Bracket -->
        <div class="bg-zinc-950 border border-cyan-900 rounded-2xl p-6">
          <h2 class="text-2xl font-bold mb-4">Tournament Bracket</h2>
          <div class="flex justify-between items-center mb-4">
            <button onclick="generateBracket()" 
                    class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded-lg font-bold">
              Generate Random Bracket (4 Fighters)
            </button>
            <button onclick="startBattle()" 
                    class="bg-red-600 hover:bg-red-500 px-8 py-2 rounded-lg font-bold text-lg">
              🔥 START BATTLE
            </button>
          </div>
          
          <div id="bracket" class="grid grid-cols-2 gap-8 text-center"></div>
        </div>

        <!-- Battle Arena -->
        <div class="bg-zinc-950 border border-cyan-900 rounded-2xl p-8 text-center">
          <h2 class="text-3xl font-bold mb-8">BATTLE ARENA</h2>
          
          <div id="battleArea" class="min-h-64 flex items-center justify-center">
            <div id="vsDisplay" class="hidden text-6xl font-bold text-amber-400">VS</div>
          </div>

          <div id="battleLog" class="battle-log mt-8 text-left bg-black/50 p-4 rounded-xl text-sm font-mono"></div>
        </div>

        <!-- Leaderboard -->
        <div class="bg-zinc-950 border border-cyan-900 rounded-2xl p-6">
          <h2 class="text-2xl font-bold mb-4">🏆 Leaderboard</h2>
          <div id="leaderboard" class="space-y-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let fighters = JSON.parse(localStorage.getItem('vsaiFighters')) || [
      { id: 1, name: "Grok", color: "#22d3ee", wins: 0, strength: 95 },
      { id: 2, name: "Claude", color: "#a78bfa", wins: 0, strength: 88 },
      { id: 3, name: "Gemini", color: "#f472b6", wins: 0, strength: 82 },
      { id: 4, name: "ChatGPT", color: "#4ade80", wins: 0, strength: 85 }
    ];

    let currentBracket = [];

    function saveFighters() {
      localStorage.setItem('vsaiFighters', JSON.stringify(fighters));
    }

    function renderFighters() {
      const container = document.getElementById('fightersList');
      container.innerHTML = fighters.map(f => `
        <div class="fighter-card bg-zinc-900 border border-cyan-800 rounded-xl p-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-xl" 
                 style="background-color: ${f.color}20; color: ${f.color}">
              🤖
            </div>
            <div>
              <div class="font-bold">${f.name}</div>
              <div class="text-xs text-cyan-500">STR: ${f.strength}</div>
            </div>
          </div>
          <button onclick="removeFighter(${f.id})" class="text-red-400 hover:text-red-500">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      `).join('');
    }

    function addFighter() {
      const nameInput = document.getElementById('fighterName');
      const name = nameInput.value.trim();
      if (!name) return;

      fighters.push({
        id: Date.now(),
        name: name,
        color: '#' + Math.floor(Math.random()*16777215).toString(16),
        wins: 0,
        strength: Math.floor(Math.random() * 30) + 70
      });
      
      nameInput.value = '';
      saveFighters();
      renderFighters();
    }

    function removeFighter(id) {
      fighters = fighters.filter(f => f.id !== id);
      saveFighters();
      renderFighters();
    }

    function generateBracket() {
      currentBracket = [...fighters].sort(() => Math.random() - 0.5).slice(0, 4);
      const bracketDiv = document.getElementById('bracket');
      
      bracketDiv.innerHTML = `
        <div class="space-y-6">
          <div class="text-center">
            <div class="text-cyan-400 text-sm mb-2">SEMI-FINAL 1</div>
            <div class="bg-zinc-900 p-4 rounded-xl">${currentBracket[0].name}</div>
          </div>
          <div class="text-center">
            <div class="text-cyan-400 text-sm mb-2">SEMI-FINAL 2</div>
            <div class="bg-zinc-900 p-4 rounded-xl">${currentBracket[1].name}</div>
          </div>
        </div>
        <div class="flex items-center justify-center text-4xl text-amber-400 font-bold">VS</div>
        <div class="space-y-6">
          <div class="text-center">
            <div class="text-cyan-400 text-sm mb-2">SEMI-FINAL 1</div>
            <div class="bg-zinc-900 p-4 rounded-xl">${currentBracket[2].name}</div>
          </div>
          <div class="text-center">
            <div class="text-cyan-400 text-sm mb-2">SEMI-FINAL 2</div>
            <div class="bg-zinc-900 p-4 rounded-xl">${currentBracket[3].name}</div>
          </div>
        </div>
      `;
    }

    function log(message, color = 'cyan') {
      const logDiv = document.getElementById('battleLog');
      logDiv.innerHTML += `<div class="text-${color}-400">${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function startBattle() {
      if (currentBracket.length < 4) {
        alert("Generate a bracket first!");
        return;
      }

      const logDiv = document.getElementById('battleLog');
      logDiv.innerHTML = '';

      log("⚔️ BATTLE STARTING...", "amber");

      // Semi-final 1
      setTimeout(() => {
        const winner1 = simulateFight(currentBracket[0], currentBracket[1]);
        log(`Semi 1: ${currentBracket[0].name} vs ${currentBracket[1].name} → <span class="text-emerald-400">${winner1.name} WINS!</span>`);
      }, 800);

      // Semi-final 2
      setTimeout(() => {
        const winner2 = simulateFight(currentBracket[2], currentBracket[3]);
        log(`Semi 2: ${currentBracket[2].name} vs ${currentBracket[3].name} → <span class="text-emerald-400">${winner2.name} WINS!</span>`);
      }, 2000);

      // Final
      setTimeout(() => {
        const finalWinner = simulateFight(
          simulateFight(currentBracket[0], currentBracket[1]),
          simulateFight(currentBracket[2], currentBracket[3])
        );
        log(`🏆 FINAL WINNER: ${finalWinner.name.toUpperCase()}!`, "yellow");
        
        finalWinner.wins++;
        saveFighters();
        renderLeaderboard();
      }, 3500);
    }

    function simulateFight(f1, f2) {
      const score1 = f1.strength + Math.random() * 20;
      const score2 = f2.strength + Math.random() * 20;
      return score1 > score2 ? f1 : f2;
    }

    function renderLeaderboard() {
      fighters.sort((a, b) => b.wins - a.wins);
      const container = document.getElementById('leaderboard');
      container.innerHTML = fighters.map((f, i) => `
        <div class="flex justify-between items-center bg-zinc-900 px-5 py-3 rounded-xl">
          <div class="flex items-center gap-4">
            <span class="text-xl">${i+1}</span>
            <span style="color:${f.color}">${f.name}</span>
          </div>
          <div class="font-bold text-emerald-400">${f.wins} WINS</div>
        </div>
      `).join('');
    }

    // Initialize
    renderFighters();
    renderLeaderboard();
  </script>
</body>
</html>
