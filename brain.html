<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic URL Text Display</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            color: #2563eb;
        }
        p {
            color: #666;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- The text will load inside this H1 -->
        <h1 id="output-text">Loading...</h1>
        <p id="sub-text">Reading data from the URL parameter.</p>
    </div>

    <script>
        // 1. Get the current URL's query parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Look specifically for the 'q' parameter
        const queryText = urlParams.get('q');
        
        // 3. Find the HTML elements we want to update
        const outputElement = document.getElementById('output-text');
        const subElement = document.getElementById('sub-text');
        
        // 4. Update the text based on what we found
        if (queryText) {
            // Using textContent protects against malicious script injections (XSS)
            outputElement.textContent = queryText;
            subElement.textContent = `You passed: "?q=${encodeURIComponent(queryText)}"`;
        } else {
            // Fallback message if someone visits the page without ?q=hello
            outputElement.textContent = "Hello, World!";
            subElement.textContent = "Try adding '?q=YourTextHere' to the end of the URL address bar.";
        }
    </script>

</body>
</html>
